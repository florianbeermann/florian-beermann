name: Deploy to Hetzner

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  web-deploy:
    name: 🎉 Deploy Website
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 🔧 Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build Project
        run: npm run build
        env:
          VITE_WEB3FORMS_KEY: ${{ secrets.WEB3FORMS_KEY }}

      - name: 📂 Sync files to Hetzner
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HETZNER_FTP_SERVER }}
          username: ${{ secrets.HETZNER_FTP_USERNAME }}
          password: ${{ secrets.HETZNER_FTP_PASSWORD }}
          local-dir: ./dist/
          # Change this to public_html/ or similar if your website files reside in a subfolder on Hetzner
          server-dir: ${{ secrets.HETZNER_FTP_DIR || './' }}
          protocol: ftps
